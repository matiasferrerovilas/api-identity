name: api-identity

services:

  mysql:
    image: mysql:latest
    container_name: api-identity-mysql
    environment:
      MYSQL_ROOT_PASSWORD: helios
      MYSQL_DATABASE: identity
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - api-identity

  rabbitmq:
    image: rabbitmq:management
    container_name: api-identity-rabbit
    environment:
      RABBITMQ_DEFAULT_USER: localhost
      RABBITMQ_DEFAULT_PASS: localhost
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - api-identity


networks:
  api-identity:
    driver: bridge

volumes:
  mysql_data:
